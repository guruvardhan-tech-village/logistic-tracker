server:
  port: 8080

spring:
  application:
    name: fleet
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/fleet_db}
    username: ${DB_USERNAME:fleet_user}
    password: ${DB_PASSWORD:fleet_password}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Custom App Properties
app:
  jwt:
    # 256-bit secret key (Replace with your own secret in production or use environment variable)
    secret: ${JWT_SECRET:your_super_secret_jwt_key_that_is_at_least_256_bits_long}
    expirationMs: 86400000 # 1 day
  simulation:
    enabled: ${SIMULATION_MODE:true}

mqtt:
  enabled: ${MQTT_ENABLED:false}
  broker-url: ${MQTT_BROKER_URL:tcp://localhost:1883}
  client-id: fleet-backend-${random.uuid}
  topic:
    telemetry: fleet/telemetry/+

# CORS configuration
cors:
  allowed-origins: ${FRONTEND_URL:http://localhost:5173}
